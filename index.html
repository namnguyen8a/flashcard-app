<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Quiz App</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<h1>AWS Quiz Practice</h1>

<div id="modeSelect">
  <button id="btnModeAll">All Questions</button>
  <button id="btnModeExam">Mock Exam (65 Q)</button>
  <button id="btnModeCloud">Cloud Concepts</button>
  <button id="btnModeTech">Tech & Services</button>
  <button id="btnModeSec">Security + Billing</button>
</div>

<hr>

<div id="quizContainer" class="hidden">
  <h2 id="question"></h2>

  <div id="options"></div>

  <div class="tabs">
    <button id="btnToggleExplain">Show/Hide Explanation</button>
    <button id="btnToggleNote">Show/Hide Note</button>
  </div>

  <div id="explain" class="hidden info-box"></div>
  <div id="note" class="hidden info-box"></div>

  <br>
  <button id="btnNext">Next Question ➡️</button>
</div>

<hr>

<div>
  <h2>Progress Tracker</h2>
  <pre id="progress"></pre>
</div>

<!-- Đã sửa thành v=3 để ép Github Pages nhận file mới nhất -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="progress.js?v=3"></script>
<script src="dataLoader.js?v=3"></script>
<script src="quizEngine.js?v=3"></script>
<script src="app.js?v=3"></script>

</body>
</html>
