<!DOCTYPE html>
<html>
<head>
  <title>AWS Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AWS Quiz Practice</h1>

<div id="modeSelect">
  <button onclick="startQuiz('all')">All Questions</button>
  <button onclick="startQuiz('exam')">Mock Exam (65 Q)</button>
  <button onclick="startQuiz('topic1')">Cloud Concepts</button>
  <button onclick="startQuiz('topic2')">Tech & Services</button>
  <button onclick="startQuiz('topic3')">Security + Billing</button>
</div>

<hr>

<div id="quizContainer" class="hidden">
  <h2 id="question"></h2>

  <div id="options"></div>

  <div class="tabs">
    <button onclick="toggleExplain()">Explanation</button>
    <button onclick="toggleNote()">Note</button>
  </div>

  <div id="explain" class="hidden"></div>
  <div id="note" class="hidden"></div>

  <br>
  <button onclick="nextQuestion()">Next</button>
</div>

<hr>

<div>
  <h2>Progress</h2>
  <pre id="progress"></pre>
</div>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="dataLoader.js"></script>
<script src="progress.js"></script>
<script src="quizEngine.js"></script>
<script src="app.js"></script>

</body>
</html>
